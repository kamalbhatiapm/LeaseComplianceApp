[build]
  command       = "npm run build"
  publish       = "dist"

[build.environment]
  NODE_VERSION  = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.supabase.co https://*.supabase.net https://hook.eu2.make.com https://hook.make.com https://*.app.n8n.cloud https://*.n8n.cloud; frame-ancestors 'none';"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=()"

